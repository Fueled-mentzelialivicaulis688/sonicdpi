# Use the official signed WinDivert 2.2.2 binaries bundled at
# `vendor/windivert/x64/`. The `vendored` feature of windivert-sys
# 0.10.0 builds the dll from source via cl.exe with default flags,
# which produces a binary whose filter parser stack-overflows on
# real-world filters (>1 MB stack required for ~200-byte filter).
# Switching to the upstream-published EV-signed dll/lib/sys avoids
# the bug and gives us a properly signed driver as a side effect.
[env]
WINDIVERT_PATH = { value = "vendor/windivert/x64", relative = true, force = true }

# Keep a slightly bumped main-thread stack just in case the official
# dll has its own appetite.
[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "link-arg=/STACK:8388608,1048576"]

[target.i686-pc-windows-msvc]
rustflags = ["-C", "link-arg=/STACK:8388608,1048576"]
