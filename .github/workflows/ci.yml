name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnetfilter-queue-dev nftables \
            libgtk-3-dev libxdo-dev libayatana-appindicator3-dev \
            pkg-config
      - run: cargo clippy --workspace --all-targets

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnetfilter-queue-dev nftables \
            libgtk-3-dev libxdo-dev libayatana-appindicator3-dev \
            pkg-config
      # Engine tests don't need root; integration with real interceptors is gated on `--ignored`.
      - run: cargo test --workspace --lib

  deny:
    runs-on: ubuntu-latest
    # WinDivert is LGPL-3.0-or-later and the new cargo-deny SPDX parser
    # has trouble with the `-or-later` suffix in `[[licenses.exceptions]]`.
    # Documented as a known issue; we keep the job as informational
    # rather than blocking until upstream resolves it.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v1
        with:
          command: check licenses
