# cargo-deny configuration. Run `cargo deny check licenses` in CI.

[graph]
all-features = false

[licenses]
version = 2
# Permissive licenses we accept everywhere.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "0BSD",
    # WinDivert (Windows only) is LGPL-3.0-or-later. We dynamically
    # link the .dll which keeps the rest of the binary permissive
    # (LGPL-3 only requires that the WinDivert library remain
    # replaceable). Documented in THIRD_PARTY_LICENSES.md.
    "LGPL-3.0-or-later",
]
confidence-threshold = 0.93

[bans]
# Transitive duplicates of `windows`, `windows-sys`, `windows-targets`,
# `windows_x86_64_msvc` — pulled in by windivert (0.48), socket2
# (0.52), and our own elevation check (0.59). These are version skews
# in upstream crates we don't control; gating CI on them produces
# false positives. We re-evaluate when the ecosystem consolidates.
multiple-versions = "allow"
wildcards = "deny"
